name: Test uvx install

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-uvx-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Install via uvx (from built wheel)
        run: |
          WHEEL=$(ls dist/*.whl)
          uv tool install "$WHEEL"

      - name: Verify entry point exists
        run: which kubecon-eu-mcp

      - name: Smoke test — server starts without crash
        run: |
          # Start the MCP server in the background (stdio mode blocks on stdin)
          kubecon-eu-mcp &
          SERVER_PID=$!

          # Give it a few seconds to import and initialize
          sleep 5

          # Check if process is still alive (didn't crash on startup)
          if kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "Server started successfully (PID $SERVER_PID)"
            kill "$SERVER_PID"
          else
            echo "Server process died unexpectedly"
            exit 1
          fi

      - name: Verify uvx one-shot execution
        run: |
          # Uninstall the tool first to test fresh uvx invocation
          uv tool uninstall kubecon-eu-mcp

          WHEEL=$(ls dist/*.whl)
          # uvx --from runs the entry point directly, closer to real user experience
          timeout 10 uvx --from "$WHEEL" kubecon-eu-mcp || EXIT_CODE=$?

          # timeout returns 124 when the process is killed after the deadline,
          # which means the server was alive and running — that's a pass
          if [ "${EXIT_CODE:-0}" -eq 124 ]; then
            echo "uvx execution verified (server ran until timeout — expected)"
          elif [ "${EXIT_CODE:-0}" -eq 0 ]; then
            echo "uvx execution verified (server exited cleanly)"
          else
            echo "uvx execution failed with exit code ${EXIT_CODE}"
            exit 1
          fi
